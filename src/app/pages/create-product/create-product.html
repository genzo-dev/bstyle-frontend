<div class="min-h-[80vh] py-12 px-4 font-sans bg-gray-50/50">
  <div class="max-w-2xl mx-auto bg-white border border-black/10 shadow-lg rounded-xl p-6 md:p-8">

    <div class="flex justify-between items-center border-b border-gray-100 pb-4 mb-6">
      <div>
        <h2 class="text-2xl font-bold text-gray-900">Cadastrar Produto</h2>
        <p class="text-gray-500 text-sm">Anuncie uma peça no catálogo</p>
      </div>
      <button
        [routerLink]="['/meus-produtos']"
        class="text-sm font-medium text-gray-500 hover:text-gray-900 underline">
        Cancelar
      </button>
    </div>

    @if (errors.length > 0) {
      <div class="bg-red-50 border border-red-200 text-red-600 p-4 rounded-lg mb-6 text-sm">
        {{ errors[0] }}
      </div>
    }

    <app-create-product-form
      [loading]="loading"
      (onSubmit)="handleSubmit($event)"
    />

  </div>
</div>
