<div class="min-h-[80vh] py-12 px-4 font-sans bg-gray-50/50">
  <div class="max-w-2xl mx-auto bg-white border border-black/10 shadow-lg rounded-xl p-6 md:p-8">
    
    <div class="flex justify-between items-center border-b border-gray-100 pb-4 mb-6">
      <div>
        <h2 class="text-2xl font-bold text-gray-900">Editar Produto</h2>
        <p class="text-gray-500 text-sm">Altere as informações do seu desapego</p>
      </div>
      <button 
        [routerLink]="['/meus-produtos']" 
        class="text-sm font-medium text-gray-500 hover:text-gray-900 underline">
        Cancelar
      </button>
    </div>

    @if (loading) {
      <div class="flex justify-center items-center py-12">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-pink-600"></div>
      </div>
    }

    @if (errorMessage) {
      <div class="bg-red-50 border border-red-200 text-red-600 p-4 rounded-lg mb-6 text-sm">
        {{ errorMessage }}
      </div>
    }

    @if (!loading) {
      <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="space-y-5">
        
        <div class="flex flex-col gap-1">
          <label class="text-sm font-semibold text-gray-700">Nome do Produto</label>
          <input 
            type="text" 
            formControlName="nome"
            class="border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:border-pink-500 transition-colors">
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-sm font-semibold text-gray-700">Descrição</label>
          <textarea 
            formControlName="descricao" 
            rows="3"
            class="border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:border-pink-500 transition-colors"></textarea>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="flex flex-col gap-1">
            <label class="text-sm font-semibold text-gray-700">Preço (R$) <span class="text-xs text-gray-400">(0 para Doação)</span></label>
            <input 
              type="number" 
              formControlName="preco"
              class="border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:border-pink-500 transition-colors">
          </div>

          <div class="flex flex-col gap-1">
            <label class="text-sm font-semibold text-gray-700">Quantidade disponível</label>
            <input 
              type="number" 
              formControlName="quantidade"
              class="border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:border-pink-500 transition-colors">
          </div>
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-sm font-semibold text-gray-700">Tipo de Item</label>
          <select 
            formControlName="tipoId"
            class="border border-gray-300 rounded-lg p-2.5 text-sm bg-white focus:outline-none focus:border-pink-500 transition-colors">
            <option [value]="1">Roupa</option>
            <option [value]="2">Calçado</option>
            <option [value]="3">Acessório</option>
          </select>
        </div>

        <div class="flex flex-col gap-2 pt-2">
          <label class="text-sm font-semibold text-gray-700">Imagem do Produto</label>
          
          <div class="flex items-center gap-4">
            <div class="w-20 h-20 rounded-lg bg-gray-100 border border-gray-200 overflow-hidden flex-shrink-0 flex items-center justify-center">
              @if (imagePreview) {
                <img [src]="imagePreview" alt="Preview" class="w-full h-full object-cover">
              } @else {
                <span class="text-2xl text-gray-400">📸</span>
              }
            </div>

            <label class="cursor-pointer bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-semibold py-2 px-4 rounded-lg border border-gray-300 transition-colors">
              Alterar Imagem
              <input type="file" (change)="onFileSelected($event)" accept="image/*" class="hidden">
            </label>
          </div>
        </div>

        <div class="flex justify-end pt-4 border-t border-gray-100">
          <button 
            type="submit" 
            [disabled]="productForm.invalid || submitting"
            class="w-full sm:w-auto bg-pink-600 hover:bg-pink-700 disabled:bg-pink-400 text-white font-semibold py-2.5 px-8 rounded-lg shadow transition-colors duration-150 text-center text-sm">
            @if (submitting) { Salvando... } @else { Salvar Alterações }
          </button>
        </div>

      </form>
    }

  </div>
</div>
