<div class="flex items-center justify-center min-h-[80vh] py-12 md:py-0">
  <div class="w-full max-w-3xl bg-white border border-black/30 shadow-lg rounded p-6">
    <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

    <app-login-form (onSubmit)="handleSubmit($event)"></app-login-form>

    @if (errors.length > 0) {
      <div class="text-red-500 mt-4">
        {{ errors[0] }}
        <!-- @for (err of errors; track err) {
          <div>{{ err }}</div>
        } -->
      </div>
    }
  </div>
</div>
