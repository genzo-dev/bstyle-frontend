<div class="flex items-center justify-center min-h-[80vh] py-12 md:py-0">
  <div class="w-full max-w-3xl bg-white border border-black/30 shadow-lg rounded p-6">
    <h2 class="text-2xl font-bold mb-6 text-center">Perfil de {{ auth.user()?.nome }}</h2>

    <app-user-update-form
      [initialData]="auth.user()"
      (onSubmit)="handleSubmit($event)"
    ></app-user-update-form>

    @if (errors.length > 0) {
      <div class="text-red-500 mt-4">
        {{ errors[0] }}
      </div>
    }
  </div>
</div>
