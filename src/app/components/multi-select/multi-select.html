<div class="flex flex-col gap-1 relative">
  @if (label) {
    <label class="text-sm font-medium">{{ label }}</label>
  }

  <button
    type="button"
    (click)="toggleOpen()"
    class="border rounded px-3 py-2 text-left outline-none transition border-gray-300 focus:border-pink-500 cursor-pointer flex items-center justify-between"
  >
    <span class="truncate text-sm" [class.text-gray-400]="!selectedLabels">
      {{ selectedLabels || 'Selecione...' }}
    </span>
    <svg
      class="w-4 h-4 text-gray-500 flex-shrink-0 transition-transform"
      [class.rotate-180]="isOpen"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
    </svg>
  </button>

  @if (isOpen) {
    <div
      class="absolute z-10 top-full mt-1 w-full bg-white border border-gray-300 rounded-lg shadow-lg max-h-48 overflow-y-auto"
    >
      @if (options.length === 0) {
        <div class="px-3 py-2 text-sm text-gray-400">Nenhuma opção disponível</div>
      }
      @for (option of options; track option.id) {
        <label
          class="flex items-center gap-2 px-3 py-2 hover:bg-gray-50 cursor-pointer text-sm"
          [class.bg-pink-50]="isSelected(option.id)"
        >
          <input
            type="checkbox"
            [checked]="isSelected(option.id)"
            (change)="toggle(option.id)"
            class="accent-pink-600"
          />
          {{ option.nome }}
        </label>
      }
    </div>
  }
</div>
