<button
  [attr.type]="type"
  [disabled]="disabled || loading"
  (click)="clicked.emit($event)"
  [ngClass]="getClasses()"
  class="transition w-full px-4 py-2 rounded flex items-center justify-center gap-2"
>
  @if (!loading) {
    <ng-content></ng-content>
  } @else {
    <span> Carregando... </span>
  }
</button>
